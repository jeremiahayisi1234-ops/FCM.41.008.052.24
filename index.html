<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Neoclassical VR Mansion — Examination</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="js/water-shader.js"></script>
  <script src="js/pool-area-animations.js"></script>
  <script src="js/walk-controls.js"></script>
</head>
<body>
  <a-scene
    vr-mode-ui="enabled: true"
    renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true; logarithmicDepthBuffer: true"
    shadow="type: pcfsoft"
    background="color: #87b8e8"
    fog="type: linear; color: #c9dff5; near: 35; far: 95">

    <!-- Assets: reuse materials for fewer GPU state changes -->
    <a-assets>
      <a-mixin id="wall-m" material="color: #f4f2ea; roughness: 0.92; metalness: 0.02"></a-mixin>
      <a-mixin id="floor-m" material="color: #c4a574; roughness: 0.78; metalness: 0.05"></a-mixin>
      <a-mixin id="trim-m" material="color: #e8e4dc; roughness: 0.85"></a-mixin>
      <a-mixin id="wood-m" material="color: #6b4423; roughness: 0.72"></a-mixin>
      <a-mixin id="fabric-m" material="color: #8b2942; roughness: 0.95"></a-mixin>
      <a-mixin id="leaf-broad" material="color: #2d6b3a; roughness: 0.9"></a-mixin>
      <a-mixin id="leaf-pine" material="color: #1e4d2b; roughness: 0.88"></a-mixin>
      <a-mixin id="leaf-palm" material="color: #3a8c4a; roughness: 0.85"></a-mixin>
    </a-assets>

    <!-- Lighting: ambient + sun + interior points -->
    <a-entity light="type: ambient; color: #eef4ff; intensity: 0.42"></a-entity>
    <a-entity
      light="type: directional; color: #fff8e8; intensity: 0.95; castShadow: true;
             shadowMapHeight: 1024; shadowMapWidth: 1024;
             shadowCameraLeft: -28; shadowCameraRight: 28;
             shadowCameraTop: 28; shadowCameraBottom: -28;
             shadowBias: -0.00025"
      position="-14 26 18"
      rotation="-42 0 0"></a-entity>

    <a-entity light="type: point; color: #ffe8cc; intensity: 0.55; distance: 14; decay: 2" position="-4 3.2 -1" shadow="cast: false"></a-entity>
    <a-entity light="type: point; color: #ffe8cc; intensity: 0.55; distance: 14; decay: 2" position="4 3.2 -1" shadow="cast: false"></a-entity>
    <a-entity light="type: point; color: #fff5e6; intensity: 0.65; distance: 12; decay: 2" position="0 3.5 4" shadow="cast: false"></a-entity>
    <a-entity light="type: point; color: #fff0dd; intensity: 0.5; distance: 10; decay: 2" position="6 5.5 2" shadow="cast: false"></a-entity>
    <a-entity light="type: point; color: #fff0dd; intensity: 0.5; distance: 10; decay: 2" position="-6 5.5 2" shadow="cast: false"></a-entity>
    <a-entity light="type: point; color: #ddeeff; intensity: 0.35; distance: 16; decay: 2" position="8 2.5 14" shadow="cast: false"></a-entity>

    <!-- Ground & paths -->
    <a-plane
      position="0 0 8"
      rotation="-90 0 0"
      width="90"
      height="90"
      material="color: #5a9c5e; roughness: 0.95; metalness: 0"
      shadow="receive: true"></a-plane>

    <a-plane position="0 0.02 8" rotation="-90 0 0" width="4" height="42" material="color: #9a8f7a; roughness: 0.9" shadow="receive: true"></a-plane>
    <a-plane position="0 0.02 8" rotation="-90 0 0" width="42" height="4" material="color: #9a8f7a; roughness: 0.9" shadow="receive: true"></a-plane>

    <!-- Fence perimeter -->
    <a-entity id="fence-group">
      <a-box position="-32 1.1 8" width="0.25" height="2.2" depth="76" material="color: #3d3a36; roughness: 0.8" shadow="cast: true"></a-box>
      <a-box position="32 1.1 8" width="0.25" height="2.2" depth="76" material="color: #3d3a36; roughness: 0.8" shadow="cast: true"></a-box>
      <a-box position="0 1.1 -30" width="64" height="2.2" depth="0.25" material="color: #3d3a36; roughness: 0.8" shadow="cast: true"></a-box>
      <a-box position="0 1.1 46" width="64" height="2.2" depth="0.25" material="color: #3d3a36; roughness: 0.8" shadow="cast: true"></a-box>
    </a-entity>

    <!-- Main gate -->
    <a-entity id="main-gate" position="0 0 -29.5">
      <a-box position="-2.8 1.6 0" width="2.2" height="3.2" depth="0.35" material="color: #2a2824; metalness: 0.25; roughness: 0.65" shadow="cast: true"></a-box>
      <a-box position="2.8 1.6 0" width="2.2" height="3.2" depth="0.35" material="color: #2a2824; metalness: 0.25; roughness: 0.65" shadow="cast: true"></a-box>
      <a-box position="0 2.85 0" width="8.2" height="0.45" depth="0.4" material="color: #3a3632; roughness: 0.7" shadow="cast: true"></a-box>
      <a-cylinder position="0 1.1 0" radius="0.12" height="2.2" material="color: #c9a227; metalness: 0.6; roughness: 0.35" shadow="cast: true"></a-cylinder>
    </a-entity>

    <!-- Mansion shell: central block + wings (neoclassical symmetry); central block uses split walls + front entrance -->
    <a-entity id="mansion-exterior" position="0 0 0">
      <!-- Central block (hollow shell: back, sides, front flanking door, transom) -->
      <a-box position="0 4 5" width="12" height="8" depth="0.35" mixin="wall-m" shadow="cast: true; receive: true"></a-box>
      <a-box position="-5.9 4 -2" width="0.35" height="8" depth="14" mixin="wall-m" shadow="cast: true; receive: true"></a-box>
      <a-box position="5.9 4 -2" width="0.35" height="8" depth="14" mixin="wall-m" shadow="cast: true; receive: true"></a-box>
      <a-box position="-3.65 4 -8.85" width="4.5" height="8" depth="0.35" mixin="wall-m" shadow="cast: true; receive: true"></a-box>
      <a-box position="3.65 4 -8.85" width="4.5" height="8" depth="0.35" mixin="wall-m" shadow="cast: true; receive: true"></a-box>
      <a-box position="0 5.6 -8.85" width="2.6" height="4.8" depth="0.35" mixin="wall-m" shadow="cast: true; receive: true"></a-box>
      <!-- East wing -->
      <a-box position="11 3.5 -2" width="8" height="7" depth="12" mixin="wall-m" shadow="cast: true; receive: true"></a-box>
      <!-- West wing -->
      <a-box position="-11 3.5 -2" width="8" height="7" depth="12" mixin="wall-m" shadow="cast: true; receive: true"></a-box>
      <!-- Roof central -->
      <a-box position="0 8.6 -2" width="12.8" height="1.2" depth="14.8" material="color: #3a3a42; roughness: 0.75" shadow="cast: true"></a-box>
      <a-box position="-11 7.8 -2" width="8.8" height="1.2" depth="12.8" material="color: #3a3a42; roughness: 0.75" shadow="cast: true"></a-box>
      <a-box position="11 7.8 -2" width="8.8" height="1.2" depth="12.8" material="color: #3a3a42; roughness: 0.75" shadow="cast: true"></a-box>
      <!-- Pediment -->
      <a-box position="0 8.2 -8.2" width="13" height="0.35" depth="1.2" material="color: #eae6de; roughness: 0.8" shadow="cast: true"></a-box>
      <a-triangle
        vertex-a="-6.5 8.2 -8.2"
        vertex-b="6.5 8.2 -8.2"
        vertex-c="0 9.6 -8.2"
        material="color: #e2ded6; roughness: 0.82"
        shadow="cast: true"></a-triangle>

      <!-- Columned porch -->
      <a-entity id="portico" position="0 0 -7.5">
        <a-box position="0 0.15 0" width="11" height="0.3" depth="3" material="color: #dcd6cc; roughness: 0.75" shadow="receive: true"></a-box>
        <a-cylinder position="-4 1.65 0" radius="0.35" height="3.3" material="color: #f0ebe3; roughness: 0.55" shadow="cast: true"></a-cylinder>
        <a-cylinder position="-2 1.65 0" radius="0.35" height="3.3" material="color: #f0ebe3; roughness: 0.55" shadow="cast: true"></a-cylinder>
        <a-cylinder position="0 1.65 0" radius="0.35" height="3.3" material="color: #f0ebe3; roughness: 0.55" shadow="cast: true"></a-cylinder>
        <a-cylinder position="2 1.65 0" radius="0.35" height="3.3" material="color: #f0ebe3; roughness: 0.55" shadow="cast: true"></a-cylinder>
        <a-cylinder position="4 1.65 0" radius="0.35" height="3.3" material="color: #f0ebe3; roughness: 0.55" shadow="cast: true"></a-cylinder>
        <a-box position="0 3.45 0" width="10.2" height="0.4" depth="0.8" material="color: #e8e2d8; roughness: 0.7" shadow="cast: true"></a-box>
      </a-entity>

      <!-- Windows (emissive hints) -->
      <a-plane position="-5.01 4 -2" width="1.8" height="2.2" material="color: #a8d4ff; emissive: #223344; emissiveIntensity: 0.35; roughness: 0.2"></a-plane>
      <a-plane position="5.01 4 -2" width="1.8" height="2.2" material="color: #a8d4ff; emissive: #223344; emissiveIntensity: 0.35; roughness: 0.2" rotation="0 180 0"></a-plane>
      <a-plane position="-11.01 3.5 0" width="1.6" height="2" material="color: #a8d4ff; emissive: #223344; emissiveIntensity: 0.3; roughness: 0.2"></a-plane>
      <a-plane position="11.01 3.5 0" width="1.6" height="2" material="color: #a8d4ff; emissive: #223344; emissiveIntensity: 0.3; roughness: 0.2" rotation="0 180 0"></a-plane>
    </a-entity>

    <!-- Interior: first floor -->
    <a-entity id="interior-f1" position="0 0.01 0">
      <a-plane position="0 0.05 -2" rotation="-90 0 0" width="19" height="12" mixin="floor-m" shadow="receive: true"></a-plane>
      <!-- Foyer / hall + stair to second floor -->
      <a-entity id="stairs" position="-1.8 0 -2">
        <a-box position="0 0.2 0" width="1.4" height="0.4" depth="0.45" mixin="trim-m" shadow="cast: true"></a-box>
        <a-box position="0 0.55 0.45" width="1.4" height="0.4" depth="0.45" mixin="trim-m" shadow="cast: true"></a-box>
        <a-box position="0 0.9 0.9" width="1.4" height="0.4" depth="0.45" mixin="trim-m" shadow="cast: true"></a-box>
        <a-box position="0 1.25 1.35" width="1.4" height="0.4" depth="0.45" mixin="trim-m" shadow="cast: true"></a-box>
        <a-box position="0 1.6 1.8" width="1.4" height="0.4" depth="0.45" mixin="trim-m" shadow="cast: true"></a-box>
        <a-box position="0 1.95 2.25" width="1.4" height="0.4" depth="0.45" mixin="trim-m" shadow="cast: true"></a-box>
        <a-box position="0 2.3 2.7" width="1.4" height="0.4" depth="0.45" mixin="trim-m" shadow="cast: true"></a-box>
        <a-box position="0 2.65 3.15" width="1.4" height="0.4" depth="0.45" mixin="trim-m" shadow="cast: true"></a-box>
        <a-box position="0 3 3.6" width="1.4" height="0.4" depth="0.45" mixin="trim-m" shadow="cast: true"></a-box>
        <a-box position="0 3.35 4.05" width="1.4" height="0.4" depth="0.45" mixin="trim-m" shadow="cast: true"></a-box>
        <a-box position="0 3.7 4.5" width="1.4" height="0.4" depth="0.45" mixin="trim-m" shadow="cast: true"></a-box>
        <a-box position="0 4.05 4.95" width="1.4" height="0.4" depth="0.45" mixin="trim-m" shadow="cast: true"></a-box>
        <a-plane position="-0.2 4.02 4.2" rotation="0 90 0" width="3.6" height="1.8" material="color: #d8d0c8; roughness: 0.9" shadow="receive: true"></a-plane>
      </a-entity>
      <a-box position="0 2 -3.5" width="4" height="4" depth="0.12" mixin="wall-m" shadow="cast: false"></a-box>
      <a-box position="-2.1 2 -1" width="0.12" height="4" depth="5" mixin="wall-m" shadow="cast: false"></a-box>
      <a-box position="2.1 2 -1" width="0.12" height="4" depth="5" mixin="wall-m" shadow="cast: false"></a-box>
      <!-- Divide west / east living -->
      <a-box position="-6.5 2 0" width="0.12" height="4" depth="8" mixin="wall-m" shadow="cast: false"></a-box>
      <a-box position="6.5 2 0" width="0.12" height="4" depth="8" mixin="wall-m" shadow="cast: false"></a-box>
      <!-- Back wall split dining / kitchen -->
      <a-box position="0 2 3.8" width="13" height="4" depth="0.12" mixin="wall-m" shadow="cast: false"></a-box>
      <a-box position="4.5 2 1.5" width="0.12" height="4" depth="4.2" mixin="wall-m" shadow="cast: false"></a-box>

      <!-- Living room 1 (west) -->
      <a-entity id="living-1">
        <a-plane position="-6 0.06 0" rotation="-90 0 0" width="7" height="8" material="color: #b8956a; roughness: 0.88" shadow="receive: true"></a-plane>
        <a-plane position="-6 0.07 0" rotation="-90 0 0" width="5" height="5" material="color: #6d4c3d; roughness: 0.95" shadow="receive: true"></a-plane>
        <a-box position="-8.5 1.5 -2" width="2.8" height="1.1" depth="0.9" mixin="fabric-m" shadow="cast: true"></a-box>
        <a-box position="-6 1.5 -2" width="2.8" height="1.1" depth="0.9" mixin="fabric-m" shadow="cast: true"></a-box>
        <a-box position="-7.25 0.55 0.5" width="4.5" height="0.35" depth="2.2" mixin="wood-m" shadow="cast: true"></a-box>
        <a-plane position="-9.45 2.2 0" rotation="0 90 0" width="3" height="1.4" material="color: #c4a882; roughness: 0.9"></a-plane>
        <a-box position="-4.2 0.4 -3" width="0.45" height="1.6" depth="0.35" material="color: #5c4033; roughness: 0.75" shadow="cast: true"></a-box>
        <a-box position="-4.2 1.15 -3" width="0.5" height="0.35" depth="0.1" material="color: #8b6914; metalness: 0.3" shadow="cast: true"></a-box>
        <a-cylinder position="-7.5 0.35 2.5" radius="0.35" height="0.7" material="color: #2d5a3a; roughness: 0.9" shadow="cast: false"></a-cylinder>
        <a-sphere position="-7.5 0.95 2.5" radius="0.45" material="color: #3d7a48; roughness: 0.85" shadow="cast: false"></a-sphere>
      </a-entity>

      <!-- Living room 2 (east) -->
      <a-entity id="living-2">
        <a-plane position="6 0.06 0" rotation="-90 0 0" width="7" height="8" material="color: #b8956a; roughness: 0.88" shadow="receive: true"></a-plane>
        <a-plane position="6 0.07 0" rotation="-90 0 0" width="5" height="5" material="color: #4a5a6b; roughness: 0.95" shadow="receive: true"></a-plane>
        <a-box position="8.5 1.5 -1.5" width="2.6" height="1.05" depth="0.85" material="color: #2a4a6b; roughness: 0.9" shadow="cast: true"></a-box>
        <a-box position="6 1.5 -1.5" width="2.6" height="1.05" depth="0.85" material="color: #2a4a6b; roughness: 0.9" shadow="cast: true"></a-box>
        <a-box position="7.25 0.55 1" width="4" height="0.35" depth="1.8" mixin="wood-m" shadow="cast: true"></a-box>
        <a-plane position="9.45 2.1 0.5" rotation="0 -90 0" width="2.5" height="1.2" material="color: #d4c4a8; roughness: 0.88"></a-plane>
        <a-box position="4.2 0.35 -2.8" width="0.5" height="1.4" depth="0.4" material="color: #4a3728; roughness: 0.8" shadow="cast: true"></a-box>
        <a-cylinder position="8 0.35 2.8" radius="0.3" height="0.65" material="color: #2d5a3a; roughness: 0.9"></a-cylinder>
        <a-sphere position="8 0.9 2.8" radius="0.4" material="color: #3d7a48; roughness: 0.85"></a-sphere>
      </a-entity>

      <!-- Dining -->
      <a-entity id="dining">
        <a-plane position="0 0.06 2" rotation="-90 0 0" width="6" height="4" material="color: #a08060; roughness: 0.82" shadow="receive: true"></a-plane>
        <a-box position="0 0.75 2" width="3.2" height="0.08" depth="1.6" material="color: #5c3d2e; roughness: 0.55" shadow="cast: true"></a-box>
        <a-cylinder position="-1.1 0.4 2" radius="0.2" height="0.75" material="color: #3a2a22; roughness: 0.7" shadow="cast: true"></a-cylinder>
        <a-cylinder position="1.1 0.4 2" radius="0.2" height="0.75" material="color: #3a2a22; roughness: 0.7" shadow="cast: true"></a-cylinder>
        <a-cylinder position="-1.1 0.4 3" radius="0.2" height="0.75" material="color: #3a2a22; roughness: 0.7" shadow="cast: true"></a-cylinder>
        <a-cylinder position="1.1 0.4 3" radius="0.2" height="0.75" material="color: #3a2a22; roughness: 0.7" shadow="cast: true"></a-cylinder>
        <a-plane position="0 2.4 3.85" rotation="0 180 0" width="4" height="1.2" material="color: #8b7355; roughness: 0.9"></a-plane>
        <a-plane position="-2.95 2 2" rotation="0 90 0" width="3.5" height="2.2" material="color: #f0e8dc; opacity: 0.95; transparent: true; roughness: 0.95"></a-plane>
        <a-plane position="2.95 2 2" rotation="0 -90 0" width="3.5" height="2.2" material="color: #f0e8dc; opacity: 0.95; transparent: true; roughness: 0.95"></a-plane>
      </a-entity>

      <!-- Kitchen -->
      <a-entity id="kitchen">
        <a-plane position="7 0.06 1.5" rotation="-90 0 0" width="5" height="4.5" material="color: #d0d4d8; roughness: 0.65" shadow="receive: true"></a-plane>
        <a-box position="8.5 1.1 3.5" width="3" height="2.2" depth="0.45" material="color: #e8ecf0; roughness: 0.45; metalness: 0.15" shadow="cast: true"></a-box>
        <a-box position="7 0.9 0.5" width="4" height="0.08" depth="1.2" material="color: #8b9aab; roughness: 0.35; metalness: 0.25" shadow="cast: true"></a-box>
        <a-box position="9.2 0.45 1.5" width="0.6" height="0.85" depth="0.55" material="color: #c0c4c8; roughness: 0.4" shadow="cast: true"></a-box>
        <a-box position="5.3 0.35 2.5" width="0.5" height="1.5" depth="0.35" material="color: #5a4a3c; roughness: 0.75" shadow="cast: true"></a-box>
        <a-cylinder position="6.5 0.25 3.2" radius="0.12" height="0.45" material="color: #6b8c5a; roughness: 0.8"></a-cylinder>
      </a-entity>
    </a-entity>

    <!-- Second floor slab + bedrooms -->
    <a-entity id="interior-f2" position="0 4 0">
      <a-plane position="-6 0.05 1" rotation="-90 0 0" width="7.5" height="9" mixin="floor-m" shadow="receive: true"></a-plane>
      <a-plane position="6 0.05 1" rotation="-90 0 0" width="7.5" height="9" mixin="floor-m" shadow="receive: true"></a-plane>
      <a-box position="-6 2.5 1" width="0.15" height="5" depth="9" mixin="wall-m" shadow="cast: false"></a-box>
      <a-box position="6 2.5 1" width="0.15" height="5" depth="9" mixin="wall-m" shadow="cast: false"></a-box>
      <a-box position="0 2.5 1" width="0.15" height="5" depth="9" mixin="wall-m" shadow="cast: false"></a-box>
      <a-box position="0 2.5 5.5" width="12" height="5" depth="0.15" mixin="wall-m" shadow="cast: false"></a-box>

      <!-- Bedroom 1 -->
      <a-entity id="bedroom-1">
        <a-plane position="-6 0.06 1" rotation="-90 0 0" width="6" height="6" material="color: #9a7a6a; roughness: 0.9" shadow="receive: true"></a-plane>
        <a-box position="-8 0.45 2" width="2.2" height="0.55" depth="3" material="color: #5c4033; roughness: 0.7" shadow="cast: true"></a-box>
        <a-box position="-8 0.85 2" width="2" height="0.35" depth="2.8" material="color: #8b5e4a; roughness: 0.85" shadow="cast: true"></a-box>
        <a-box position="-4.5 0.35 -1" width="0.45" height="1.4" depth="0.35" material="color: #4a3a2a; roughness: 0.75" shadow="cast: true"></a-box>
        <a-plane position="-9.45 2.2 1" rotation="0 90 0" width="3" height="1.2" material="color: #c8b89a; roughness: 0.88"></a-plane>
        <a-plane position="-6 2.5 -2" rotation="0 0 0" width="4" height="2" material="color: #e8ddd0; opacity: 0.92; transparent: true; roughness: 0.95"></a-plane>
        <a-cylinder position="-7 0.3 3.5" radius="0.25" height="0.55" material="color: #3d6b4a; roughness: 0.88"></a-cylinder>
      </a-entity>

      <!-- Bedroom 2 -->
      <a-entity id="bedroom-2">
        <a-plane position="6 0.06 1" rotation="-90 0 0" width="6" height="6" material="color: #8a7a9a; roughness: 0.9" shadow="receive: true"></a-plane>
        <a-box position="8 0.45 2" width="2.2" height="0.55" depth="3" material="color: #4a3a5c; roughness: 0.72" shadow="cast: true"></a-box>
        <a-box position="8 0.85 2" width="2" height="0.35" depth="2.8" material="color: #6a5a8a; roughness: 0.85" shadow="cast: true"></a-box>
        <a-box position="4.5 0.35 -0.5" width="0.45" height="1.4" depth="0.35" material="color: #3a2a3c; roughness: 0.75" shadow="cast: true"></a-box>
        <a-plane position="9.45 2.2 1.5" rotation="0 -90 0" width="3" height="1.2" material="color: #b8a890; roughness: 0.88"></a-plane>
        <a-plane position="6 2.5 -2" width="4" height="2" material="color: #e8e0f0; opacity: 0.92; transparent: true; roughness: 0.95"></a-plane>
        <a-cylinder position="7 0.3 3.5" radius="0.25" height="0.55" material="color: #4a7a5a; roughness: 0.88"></a-cylinder>
      </a-entity>
    </a-entity>

    <!-- Ceiling split for stairwell opening -->
    <a-box position="-5 3.95 -2" width="7" height="0.1" depth="12" material="color: #ece8e0; roughness: 0.92" shadow="receive: true"></a-box>
    <a-box position="5 3.95 -2" width="7" height="0.1" depth="12" material="color: #ece8e0; roughness: 0.92" shadow="receive: true"></a-box>
    <a-box position="0 3.95 3" width="4" height="0.1" depth="4" material="color: #ece8e0; roughness: 0.92" shadow="receive: true"></a-box>

    <!-- Trees: Type A — broad canopy (×3) -->
    <a-entity class="tree-type-a" position="-22 0 -12" shadow="cast: true">
      <a-cylinder radius="0.35" height="2.5" position="0 1.25 0" material="color: #4a3322; roughness: 0.85"></a-cylinder>
      <a-sphere radius="2.2" position="0 3.4 0" mixin="leaf-broad"></a-sphere>
      <a-sphere radius="1.5" position="0.8 3.1 0.6" mixin="leaf-broad"></a-sphere>
    </a-entity>
    <a-entity class="tree-type-a" position="24 0 2" shadow="cast: true">
      <a-cylinder radius="0.35" height="2.5" position="0 1.25 0" material="color: #4a3322; roughness: 0.85"></a-cylinder>
      <a-sphere radius="2.2" position="0 3.4 0" mixin="leaf-broad"></a-sphere>
      <a-sphere radius="1.5" position="-0.6 3.2 -0.4" mixin="leaf-broad"></a-sphere>
    </a-entity>
    <a-entity class="tree-type-a" position="-18 0 22" shadow="cast: true">
      <a-cylinder radius="0.38" height="2.6" position="0 1.3 0" material="color: #4a3322; roughness: 0.85"></a-cylinder>
      <a-sphere radius="2.1" position="0 3.35 0" mixin="leaf-broad"></a-sphere>
    </a-entity>

    <!-- Type B — conical pine (×3) -->
    <a-entity class="tree-type-b" position="26 0 -18" shadow="cast: true">
      <a-cylinder radius="0.28" height="3" position="0 1.5 0" material="color: #3d2a1a; roughness: 0.88"></a-cylinder>
      <a-cone radius-bottom="1.8" height="3.2" position="0 3.8 0" mixin="leaf-pine"></a-cone>
      <a-cone radius-bottom="1.3" height="2.4" position="0 5.2 0" mixin="leaf-pine"></a-cone>
    </a-entity>
    <a-entity class="tree-type-b" position="-26 0 8" shadow="cast: true">
      <a-cylinder radius="0.28" height="3" position="0 1.5 0" material="color: #3d2a1a; roughness: 0.88"></a-cylinder>
      <a-cone radius-bottom="1.7" height="3" position="0 3.6 0" mixin="leaf-pine"></a-cone>
      <a-cone radius-bottom="1.2" height="2.2" position="0 4.9 0" mixin="leaf-pine"></a-cone>
    </a-entity>
    <a-entity class="tree-type-b" position="20 0 28" shadow="cast: true">
      <a-cylinder radius="0.3" height="3.1" position="0 1.55 0" material="color: #3d2a1a; roughness: 0.88"></a-cylinder>
      <a-cone radius-bottom="1.75" height="3.1" position="0 3.7 0" mixin="leaf-pine"></a-cone>
      <a-cone radius-bottom="1.25" height="2.3" position="0 5 0" mixin="leaf-pine"></a-cone>
    </a-entity>

    <!-- Type C — palm (×3) -->
    <a-entity class="tree-type-c" position="14 0 24" shadow="cast: true">
      <a-cylinder radius="0.22" height="4" position="0 2 0" material="color: #5c4a32; roughness: 0.8"></a-cylinder>
      <a-cone radius-bottom="1.2" height="2.5" position="0 4.2 0" rotation="35 0 0" mixin="leaf-palm"></a-cone>
      <a-cone radius-bottom="1.1" height="2.3" position="0 4.1 0" rotation="-30 60 0" mixin="leaf-palm"></a-cone>
      <a-cone radius-bottom="1" height="2.2" position="0 4 0" rotation="-28 -50 0" mixin="leaf-palm"></a-cone>
    </a-entity>
    <a-entity class="tree-type-c" position="-12 0 30" shadow="cast: true">
      <a-cylinder radius="0.22" height="3.9" position="0 1.95 0" material="color: #5c4a32; roughness: 0.8"></a-cylinder>
      <a-cone radius-bottom="1.15" height="2.4" position="0 4.1 0" rotation="32 20 0" mixin="leaf-palm"></a-cone>
      <a-cone radius-bottom="1.05" height="2.1" position="0 3.9 0" rotation="-25 -70 0" mixin="leaf-palm"></a-cone>
    </a-entity>
    <a-entity class="tree-type-c" position="28 0 12" shadow="cast: true">
      <a-cylinder radius="0.24" height="4.1" position="0 2.05 0" material="color: #5c4a32; roughness: 0.8"></a-cylinder>
      <a-cone radius-bottom="1.18" height="2.45" position="0 4.15 0" rotation="30 -30 0" mixin="leaf-palm"></a-cone>
      <a-cone radius-bottom="1" height="2.15" position="0 4 0" rotation="-26 90 0" mixin="leaf-palm"></a-cone>
    </a-entity>

    <!-- Pool deck + animated water -->
    <a-entity id="pool-area" position="8 0 14">
      <a-box position="0 -0.05 0" width="10" height="0.15" depth="7" material="color: #c8beb0; roughness: 0.75" shadow="receive: true"></a-box>
      <a-box position="0 0.35 0" width="9.8" height="0.65" depth="6.8" material="color: #a8a098; roughness: 0.7" shadow="receive: true"></a-box>
      <a-plane
        position="0 0.72 0"
        rotation="-90 0 0"
        width="7.2"
        height="4.8"
        material="shader: pool-water; transparent: true; opacity: 0.9"
        pool-water-animate="speed: 1"
        shadow="receive: true"></a-plane>
      <a-box position="0 0.35 -3.5" width="10" height="0.7" depth="0.35" material="color: #b0a898; roughness: 0.72" shadow="cast: true"></a-box>
    </a-entity>

    <!-- Animated children + dog (compound meshes) -->
    <a-entity id="child-one" animate-child-one="center: 6 0 14; radiusX: 3.2; radiusZ: 2.4; baseY: 0.9">
      <a-box position="0 0.35 0" width="0.45" height="0.7" depth="0.28" material="color: #e85d5d; roughness: 0.85" shadow="cast: true"></a-box>
      <a-sphere position="0 0.95 0" radius="0.22" material="color: #e8c4a8; roughness: 0.8" shadow="cast: true"></a-sphere>
      <a-box position="-0.22 0.25 0" width="0.12" height="0.45" depth="0.12" material="color: #e8c4a8; roughness: 0.85" shadow="cast: true"></a-box>
      <a-box position="0.22 0.25 0" width="0.12" height="0.45" depth="0.12" material="color: #e8c4a8; roughness: 0.85" shadow="cast: true"></a-box>
    </a-entity>

    <a-entity id="child-two" animate-child-two="center: 5.2 0 13.2; radius: 2.1; baseY: 0.85">
      <a-box position="0 0.32 0" width="0.4" height="0.65" depth="0.26" material="color: #4a8ce8; roughness: 0.85" shadow="cast: true"></a-box>
      <a-sphere position="0 0.88 0" radius="0.2" material="color: #d8b090; roughness: 0.8" shadow="cast: true"></a-sphere>
      <a-box position="-0.2 0.22 0" width="0.1" height="0.4" depth="0.1" material="color: #d8b090; roughness: 0.85" shadow="cast: true"></a-box>
      <a-box position="0.2 0.22 0" width="0.1" height="0.4" depth="0.1" material="color: #d8b090; roughness: 0.85" shadow="cast: true"></a-box>
    </a-entity>

    <a-entity id="dog" animate-dog="center: 7.4 0 14.5; radius: 1.5; baseY: 0.28">
      <a-box position="0 0.15 0" width="0.55" height="0.28" depth="0.35" material="color: #6b4423; roughness: 0.88" shadow="cast: true"></a-box>
      <a-box position="0.32 0.2 0" width="0.22" height="0.2" depth="0.22" material="color: #6b4423; roughness: 0.88" shadow="cast: true"></a-box>
      <a-box position="-0.35 0.08 0" width="0.15" height="0.12" depth="0.1" material="color: #6b4423; roughness: 0.9" shadow="cast: true"></a-box>
    </a-entity>

    <!-- Player rig: walk-controls = WASD / arrows (desktop); click canvas if keys don’t respond -->
    <a-entity
      id="rig"
      walk-controls="speed: 6"
      position="0 0 26"
      rotation="0 0 0">
      <a-entity camera position="0 1.6 0" look-controls="pointerLockEnabled: false"></a-entity>
      <a-entity
        laser-controls="hand: right"
        raycaster="objects: [data-clickable]; far: 20"
        line="color: #ccc; opacity: 0.35"></a-entity>
    </a-entity>
  </a-scene>
</body>
</html>
